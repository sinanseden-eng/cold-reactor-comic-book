<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Reactor Art Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        .font-tech { font-family: 'Chakra Petch', sans-serif; }
        .font-mono-glitch { font-family: 'Share Tech Mono', monospace; }
        .glitch-text { text-shadow: 2px 0 #0ff, -2px 0 #f0f; }
    </style>
</head>
<body class="bg-[#050505] text-white flex flex-col items-center justify-center min-h-screen p-4 font-tech selection:bg-yellow-400 selection:text-black">
    <div id="app" class="w-full max-w-md flex flex-col items-center gap-6">
        
        <div class="text-center w-full border-b border-yellow-400/30 pb-4">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 tracking-tighter glitch-text uppercase">SYS.IMG_GEN</h1>
            <p class="text-xs text-yellow-400/70 font-mono-glitch mt-1 uppercase tracking-widest">Generating 20.jpg (Corrupted AI Deity)</p>
        </div>

        <!-- Image Container -->
        <div id="image-container" class="w-full aspect-[16/9] bg-black border-2 border-yellow-400 rounded flex flex-col items-center justify-center overflow-hidden relative shadow-[0_0_20px_rgba(234,255,0,0.2)] transition-all">
            
            <!-- Loading State -->
            <div id="loader" class="flex flex-col items-center gap-4 p-6 text-center">
                <svg class="animate-spin h-10 w-10 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm font-bold text-yellow-400 uppercase tracking-widest font-mono-glitch animate-pulse">Processing...</span>
                <p class="text-xs text-blue-400 font-mono-glitch">Rendering digital deity...</p>
            </div>

            <!-- Result Image -->
            <img id="result-img" class="hidden w-full h-full object-cover" alt="Generated Comic Panel">
            
            <!-- Scanline Overlay -->
            <div class="absolute inset-0 pointer-events-none z-20 opacity-20 mix-blend-overlay" style="background-image: linear-gradient(transparent 50%, rgba(0,0,0,0.8) 50%); background-size: 100% 4px;"></div>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="hidden text-red-400 text-sm text-center font-mono-glitch bg-red-950/50 border border-red-900 p-4 rounded w-full"></div>

        <!-- Download Button -->
        <button id="download-btn" class="hidden w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-4 px-4 rounded transition-all uppercase tracking-widest text-sm border-2 border-transparent shadow-[0_0_15px_rgba(234,255,0,0.4)] flex items-center justify-center gap-2 font-mono-glitch">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            DOWNLOAD_20.JPG
        </button>
    </div>

    <script>
        const apiKey = ""; // API Key provided by execution environment
        
        // PROMPT: A glitching, corrupted AI face in neon red and yellow.
        const promptText = "Cyberpunk digital noir graphic novel art style. A distorted, corrupted visual of a massive, terrifying AI face or digital deity floating in a pitch-black void. The face is glitching wildly with aggressive neon-red and neon-yellow digital artifacts, code blocks, and static. Dystopian artificial intelligence, technological horror. Cinematic, extreme high contrast, clean sharp vector-like lines mixed with heavy digital glitch artifacts. No text, no speech bubbles.";

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function fetchWithRetry(url, options, retries = 5) {
            let backoff = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`API Error: Status ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await delay(backoff);
                    backoff *= 2; // Exponential backoff
                }
            }
        }

        async function generateImage() {
            const loader = document.getElementById('loader');
            const resultImg = document.getElementById('result-img');
            const errorMsg = document.getElementById('error-msg');
            const downloadBtn = document.getElementById('download-btn');

            // Reset UI
            loader.classList.remove('hidden');
            resultImg.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            errorMsg.classList.add('hidden');

            try {
                const payload = {
                    instances: { prompt: promptText },
                    parameters: { sampleCount: 1, aspectRatio: "16:9" }
                };

                const result = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }
                );
                
                if (result && result.predictions && result.predictions[0]) {
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    
                    // Display image
                    resultImg.src = imageUrl;
                    resultImg.classList.remove('hidden');
                    loader.classList.add('hidden');
                    
                    // Setup download button
                    downloadBtn.classList.remove('hidden');
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = imageUrl;
                        a.download = '20.jpg';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    };
                } else {
                    throw new Error("No image data returned from the generation service.");
                }
            } catch (error) {
                loader.classList.add('hidden');
                errorMsg.textContent = "SYS.ERR: " + error.message;
                errorMsg.classList.remove('hidden');
            }
        }

        window.onload = generateImage;
    </script>
</body>
</html>
